name: Linters and tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint_and_type:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ 3.14 ]
    steps:
      - name: Checkout repo
        uses: actions/checkout@master
      - name: Set up Python
        uses: actions/setup-python@master
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv package manager
        run: |
          python -m pip install --upgrade pip setuptools
          pip install uv
      - name: Install dependencies with uv
        run: |
          uv sync --frozen --group dev
      - name: Run Ruff linter
        run: |
          uv run ruff check .
      - name: Run mypy type checks
        run: |
          uv run mypy app

  tests:
    runs-on: ubuntu-latest
    env:
      DEBUG: "true"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      DB_MASTER_HOST: "localhost"
      DB_MASTER_PORT: "5432"
      DB_MASTER_USER: "postgres"
      DB_MASTER_PASSWORD: "app_pswd"
      DB_DATABASE: "chats"
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: app_pswd
          POSTGRES_DB: chats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: [3.14]
    steps:
    - name: Checkout repo
      uses: actions/checkout@master
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv package manager
      run: |
        python -m pip install --upgrade pip setuptools
        pip install uv
    - name: Install dependencies with uv
      run: |
        uv sync --frozen --group dev
    - name: Load Redis scripts
      run: |
        uv run python - <<'PY'
        from pathlib import Path
        import redis

        client = redis.Redis(host="localhost", port=6379, db=1)
        scripts = [
            Path("app/scripts/redis/send_message_to_user.lua"),
            Path("app/scripts/redis/get_dialog_with_users.lua"),
        ]
        for script_path in scripts:
            sha = client.script_load(script_path.read_text(encoding="utf-8"))
            print(f"Loaded {script_path} -> {sha}")
        PY
    - name: Run tests
      run: |
        uv run pytest --cov=app --cov-report=xml
    - name: Upload coverage report
      uses: actions/upload-artifact@master
      with:
        name: coverage-report
        path: coverage.xml

  docker_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@master
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master
      - name: Build Dev image
        run: |
          docker build \
            --target dev \
            --build-arg PYTHON_VERSION=3.14 \
            -t otus-chats:dev .
      - name: Build Prod image
        run: |
          docker build \
            --target prod \
            --build-arg PYTHON_VERSION=3.14 \
            -t otus-chats:prod .
      - name: Verify images
        run: |
          docker images | grep otus-chats
