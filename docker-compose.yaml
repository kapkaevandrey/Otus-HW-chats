services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: "no"
    environment:
      DB_MASTER_HOST: db
      DB_DATABASE: chats
    env_file:
      - dev.env
    command: ["init"]
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    restart: always
    environment:
      ALLOW_ORIGINS: "http://localhost:3030,http://0.0.0.0:3030"
      DB_MASTER_HOST: db
      DB_DATABASE: chats
      KAFKA_BROKERS: kafka:9093
      REDIS_HOST: redis
    ports:
      - "8001:8001"
    env_file:
      - dev.env
    command: ["api", "8001"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      kafka:
        condition: service_started
      valkey:
        condition: service_started
      redis-script-loader:
        condition: service_completed_successfully

  db:
    image: postgres:17
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: chats
      POSTGRES_PASSWORD: app_pswd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: dhi.io/kafka:4.1-native
    container_name: kafka
    ports:
      - "9092:9092"
    expose:
      - "9093"
    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9093,OUTSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9093,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 50
    volumes:
      - kafka_data:/var/lib/kafka/data
      - /var/run/docker.sock:/var/run/docker.sock

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8082:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: true
      KAFKA_CLUSTERS_0_NAME: kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  valkey:
    image: dhi.io/valkey:9
    container_name: redis
    ports:
      - "6380:6379"
    command: ["valkey-server", "--protected-mode", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]

  redis-script-loader:
    image: dhi.io/valkey:9
    restart: "no"
    depends_on:
      valkey:
        condition: service_started
    volumes:
      - ./app/scripts/redis:/lua/redis:ro
    command:
      - /bin/sh
      - -ec
      - |
        echo "Loading Redis Lua scripts..."
        for f in /lua/redis/*.lua; do
          valkey-cli -h redis SCRIPT LOAD "$$(cat "$$f")" >/dev/null
          echo "Loaded $$f"
        done
        echo "Redis Lua scripts loaded."

volumes:
  kafka_data:
